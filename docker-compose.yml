services:
  refresh-es-api:
    build: .
    image: kumarpnq/refresh-es-api:latest
    container_name: refresh-es-api-prod
    user: "1000:1000"
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=${API_PORT:-8000}
      - DEBUG=false
      - WORKERS=8
      - MAX_WORKERS=200
      - MIN_BATCH_WORKERS=60
      - BATCH_SIZE=500
      - MONGODB_URL=${MONGODB_URL}
      - MONGODB_DATABASE=${MONGODB_DATABASE:-pnq_etl}
      - PG_MONGO_URI=${PG_MONGO_URI}
      - PG_MONGO_DB=${PG_MONGO_DB:-pnq_etl}
      - MONGODB_HEARTBEAT_FREQUENCY_MS=${MONGODB_HEARTBEAT_FREQUENCY_MS:-30000}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - ELASTICSEARCH_URL=${ELASTICSEARCH_URL}
      - ES_HOST=${ES_HOST:-${ELASTICSEARCH_URL}}
      - ES_USERNAME=${ES_USERNAME:-}
      - ES_PASSWORD=${ES_PASSWORD}
      - ES_USER=${ES_USER:-${ES_USERNAME:-}}
      - LOG_LEVEL=INFO
      - METRICS_ENABLED=true
      - API_KEY=${API_KEY}
      - ENABLE_AUTH=${ENABLE_AUTH:-true}
      - RATE_LIMIT_REQUESTS=${RATE_LIMIT_REQUESTS:-1000}
      - RATE_LIMIT_WINDOW=${RATE_LIMIT_WINDOW:-60}
      - ELASTIC_TAGGING_PATH=/elasticTagging
      - BACKTRACKING_STANDALONE_WORKER=true  # Don't start worker in API - runs via start_all.sh script
      - BACKTRACKING_POLL_INTERVAL=${BACKTRACKING_POLL_INTERVAL:-5}
      - TZ=Asia/Kolkata
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - BOOLEAN_TRANSLATE_MODEL=${BOOLEAN_TRANSLATE_MODEL:-gpt-4o-mini}
    volumes:
      - ./logs:/app/logs
      - ./pnq_ca.crt:/etc/ssl/mongo/ca.crt:ro
      # Mount your elasticTagging repo to /elasticTagging so percolator can import tagger
      # - /absolute/path/to/elasticTagging:/elasticTagging:ro
    restart: unless-stopped
    networks:
      - refresh-es-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4.0'
        reservations:
          memory: 2G
          cpus: '2.0'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    command: ["sh", "-c", "mkdir -p /app/logs && chmod -R 777 /app/logs 2>/dev/null || true && python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 & python backtracking_worker.py"]

  # Redis for caching and session storage
  redis:
    image: redis:7.2-alpine
    container_name: refresh-es-redis-prod
    volumes:
      - redis_prod_data:/data
    restart: unless-stopped
    networks:
      - refresh-es-network
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - 1gb
      - --maxmemory-policy
      - allkeys-lru
      - --save
      - "900 1"
      - --save
      - "300 10"
      - --user
      - pnqSync
      - on
      - ">${REDIS_PASSWORD}"
      - allcommands
      - allkeys
      - --user
      - default
      - off
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3



  # Grafana for visualization (optional)

volumes:
  redis_prod_data:

networks:
  refresh-es-network:
    driver: bridge
